name: Build Dataset
on: workflow_dispatch

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests
          sudo apt-get update && sudo apt-get install -y gcc g++ cmake make
          sudo apt-get install -y libgtest-dev libncurses5-dev

      - name: Discover projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/find_projects.py

      # - name: Commit new projects
      #   run: |
      #     git config user.email "bot@github.local"
      #     git config user.name "DatasetBot"
      #     git add dataset_sources/
      #     git diff --staged --quiet || git commit -m "auto: import projects [skip ci]"
      #     git push || true

      - name: Process projects
        run: |
          mkdir -p output
          for lang in c cpp mixed; do
            [ -d "dataset_sources/$lang" ] || continue
            find "dataset_sources/$lang" -mindepth 1 -maxdepth 1 -type d | while read -r proj; do
              name=$(basename "$proj")
              mkdir -p "work/$name" && cp -r "$proj"/* "work/$name/" 2>/dev/null || continue
              cd "work/$name" || continue

              rm -rf build bin .git 2>/dev/null
              find . -name "*.o" -delete 2>/dev/null
              mkdir -p bin build 2>/dev/null || true
              git submodule update --init --recursive 2>/dev/null || true

              build_success=false
              if [ -f "Makefile" ]; then
                make -j2 >/dev/null 2>&1 && build_success=true
              elif [ -f "CMakeLists.txt" ]; then
                cmake -B build -S . >/dev/null 2>&1 && cmake --build build >/dev/null 2>&1 && build_success=true
              fi

              if [ "$build_success" = false ]; then
                cd ../.. || continue
                continue
              fi

              cd ../.. || continue
              mkdir -p "output/$name"
              cp -r "work/$name"/* "output/$name/" 2>/dev/null || continue

              if [ ! -f "output/$name/info.txt" ]; then
                printf "Name: %s\nLanguage: %s\nBuild: auto\nOutput: auto\nDescription: Auto-imported project\n" "$name" "$lang" > "output/$name/info.txt"
              fi
            done
          done

      - uses: actions/upload-artifact@v4
        with:
          name: dataset-result
          path: output/
          retention-days: 90