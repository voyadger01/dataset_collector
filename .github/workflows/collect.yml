name: Build Dataset
on: workflow_dispatch

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests
          sudo apt-get update && sudo apt-get install -y gcc g++ cmake make

      - name: Discover projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/find_projects.py

      # - name: Commit new projects
      #   run: |
      #     git config user.email "bot@github.local"
      #     git config user.name "DatasetBot"
      #     git add dataset_sources/
      #     git diff --staged --quiet || git commit -m "auto: import projects [skip ci]"
      #     git push || true

      - name: Process projects
        run: |
          mkdir -p output
          find dataset_sources -mindepth 2 -maxdepth 2 -type d | while read proj; do
            name=$(basename "$proj")
            mkdir -p "work/$name" && cp -r "$proj"/* "work/$name/"
            cd "work/$name"
            
            rm -rf build bin; find . -name "*.o" -delete 2>/dev/null
            
            if [ -f Makefile ]; then
              make -j2 || { echo "SKIP: $name"; cd ../..; continue; }
            elif [ -f CMakeLists.txt ]; then
              cmake -B build && cmake --build build || { echo "SKIP: $name"; cd ../..; continue; }
            else
              echo "SKIP: $name (no build file)"; cd ../..; continue
            fi            
            cd ../..
            mkdir -p "output/$name"
            cp -r "work/$name"/* "output/$name/"
            [ -f "work/$name/info.txt" ] || echo -e "Name: $name\nLanguage: auto\nBuild: auto\nOutput: auto\nDescription: auto" > "output/$name/info.txt"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: dataset-result
          path: output/